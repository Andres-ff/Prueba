backend:
  name: git-gateway
  branch: main  # Cambia por la rama principal de tu repo

media_folder: "public/images"
public_folder: "/images"

collections:
  - name: "carousel"
    label: "Carrusel"
    files:
      - file: "public/carousel.json"
        label: "Imágenes del Carrusel"
        name: "carousel"
        fields:
          - { label: "Imágenes", name: "images", widget: "list", field: {
              label: "Imagen", name: "image", widget: "object", fields: [
                { label: "URL", name: "src", widget: "string" },
                { label: "Descripción", name: "alt", widget: "string" }
              ]
            }
          }
