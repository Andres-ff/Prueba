backend:
  name: git-gateway
  branch: main

media_folder: "public/images"
public_folder: "/images"

collections:
  - name: "carousel"
    label: "Carrusel"
    files:
      - file: "src/data/carousel.json"
        label: "Imágenes del Carrusel"
        name: "carousel"
        format: json
        fields:
          - label: "Imágenes"
            name: ""
            widget: list
            fields:
              - {label: Imagen, name: src, widget: image}
              - {label: Descripción, name: alt, widget: string}
